services:
  # Loki for Logs
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./test/loki-config.yaml:/etc/loki/local-config.yaml
      - /loki
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Mimir for Metrics
  mimir:
    image: grafana/mimir:2.10.0
    ports:
      - "8080"  
    command: 
      - -config.file=/etc/mimir.yaml
      - -target=all
    volumes:
      - ./test/mimir-config.yaml:/etc/mimir.yaml
      - /data
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Tempo for Traces
  tempo:
    image: grafana/tempo:2.2.0
    ports:
      - "3200"
      - "3201"  # OTLP HTTP receiver
    command: 
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./test/tempo-config.yaml:/etc/tempo.yaml
      - /tmp/tempo
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./test/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - /var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Your otel-lgtm-proxy
  otel-lgtm-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8443"  # Main HTTP server for all OTLP endpoints
    environment:
      - LOG_LEVEL=DEBUG
      - HTTP_LISTEN_ADDRESS=:8443
      - OLP_LOGS_ADDRESS=http://loki:3100/otlp/v1/logs
      - OLP_METRICS_ADDRESS=http://mimir:8080/otlp/v1/metrics
      - OLP_TRACES_ADDRESS=http://tempo:3201/v1/traces
      - OTEL_SERVICE_NAME=otel-lgtm-proxy
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      # Note: No tenant.id set here to test default tenant logic
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "http://localhost:8443/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  # OpenTelemetry Collector - receives OTLP and forwards to our proxy
  otel-collector:
    build:
      context: ./test
      dockerfile: Dockerfile.collector
    ports:
      - "4317"  # OTLP gRPC receiver
      - "4318"  # OTLP HTTP receiver
      - "13133"  # Health check endpoint
    volumes:
      - ./test/otel-collector-config.yaml:/etc/otelcol-contrib/otel-collector-config.yaml
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
    depends_on:
      loki:
        condition: service_healthy
      mimir:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # telemetrygen services — one per tenant per service per signal type.
  # Multiple service names per tenant mean each batch window bundles multiple
  # ResourceSpans for the same tenant, giving signal.tenant.records > 1 and
  # demonstrating realistic multi-service fan-out.

  # ── tenant-a / web-app ──────────────────────────────────────────────────────
  gen-tenant-a-web-app-traces:
    build:
      context: ./test
      dockerfile: Dockerfile.telemetrygen
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - '--otlp-attributes=tenant.id="tenant-a"'
      - --service=web-app
      - --duration=Inf
      - --rate=6
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy

  gen-tenant-a-web-app-logs:
    build:
      context: ./test
      dockerfile: Dockerfile.telemetrygen
