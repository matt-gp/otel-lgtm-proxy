      - '--otlp-attributes=tenant.id="tenant-a"'
      - --service=web-app
      - --duration=Inf
      - --rate=12
    restart: unless-stopped
    depends_on:
      otel-collector:
        condition: service_healthy

  gen-tenant-a-web-app-metrics:
